# Note: Version is optional in modern Docker Compose
services:
  # 1. The FastAPI Gateway (The Front Door)
  web:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  # 2. The Celery Worker (The Background Chef)
  worker:
    build: .
    # This command starts the Celery worker inside the container
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  # 3. The Redis Broker (The Message Waiting Room)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"